<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AXON — Enterprise Knowledge Assistant</title>
<!-- Google Sign-In: paste your OAuth client id below to enable the profile
     card (photo, name, email, logout). Leave empty to run without auth. -->
<meta name="google-client-id" content="">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#0A0E17; --panel:#121A29; --soft:#1A2436; --inset:#080C14;
    --glass:rgba(19,27,42,.72); --glass-border:rgba(76,98,140,.28);
    --border:#24304A; --border-soft:#1B2539;
    --ink:#E7EDF7; --dim:#94A3BD; --faint:#5F6D88;
    --accent:#F0A03C; --accent-dim:#8a5f28;
    --good:#46B584; --warn:#E0A63E; --bad:#E25A5A;
    --blue:#4E8AD0; --teal:#2FA382; --violet:#A96BC4; --rose:#C75F72; --amber:#C08627;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --rail-w:288px; --graph-w:360px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--ink);overflow:hidden;
    font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input,textarea{font:inherit}
  ::selection{background:rgba(240,160,60,.28)}
  ::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:#263144;border-radius:8px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

  .app{display:flex;height:100vh;min-width:0}
  .app.focus-mode aside, .app.focus-mode #graphside, .app.focus-mode .splitter{display:none}

  /* ---------- splitters (VS Code style) ---------- */
  .splitter{flex:none;width:5px;cursor:col-resize;background:transparent;transition:background .15s;position:relative;z-index:5}
  .splitter:hover,.splitter.active{background:var(--accent-dim)}

  /* ---------- sidebar ---------- */
  aside{width:var(--rail-w);min-width:200px;max-width:460px;flex:none;background:var(--inset);
    border-right:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;min-height:0}
  aside.collapsed{display:none}
  .brand{display:flex;align-items:center;gap:8px;padding:2px 4px 12px}
  .brand b{font-size:18px;font-weight:800;letter-spacing:.2em}
  .brand b i{color:var(--accent);font-style:normal}
  .brand span{font:500 9px var(--mono);letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
  .newchat{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#17110A;
    border-radius:9px;padding:9px 12px;font-weight:650;font-size:13px;margin-bottom:12px}
  .newchat:hover{background:#F7B056}
  .sec-label{font:600 9.5px var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
    padding:10px 4px 7px;display:flex;align-items:center;gap:6px}
  .sec-label .n{margin-left:auto;color:var(--dim)}
  .sec-label .tw{cursor:pointer;color:var(--faint)}
  .searchbox{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border-soft);
    border-radius:8px;padding:6px 10px;margin-bottom:8px}
  .searchbox input{flex:1;background:none;border:0;outline:none;color:var(--ink);font-size:12.5px;min-width:0}
  .searchbox svg{flex:none;color:var(--faint)}
  #convlist{overflow-y:auto;min-height:60px;max-height:34vh;margin-bottom:4px}
  .conv{display:flex;gap:8px;align-items:center;padding:7px 8px;border-radius:8px;font-size:12.5px;cursor:pointer;position:relative}
  .conv:hover{background:var(--panel)}
  .conv.active{background:var(--soft);border:1px solid var(--border-soft)}
  .conv .pin-ic{flex:none;color:var(--accent);font-size:10px}
  .conv .ct{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .conv .acts{flex:none;display:none;gap:2px}
  .conv:hover .acts{display:flex}
  .conv .acts button{color:var(--faint);font-size:11px;padding:2px 4px;border-radius:4px}
  .conv .acts button:hover{color:var(--ink);background:var(--soft)}
  .conv input.rn{flex:1;min-width:0;background:var(--inset);border:1px solid var(--accent-dim);border-radius:5px;
    color:var(--ink);font-size:12px;padding:2px 6px;outline:none}
  .upload{border:1px dashed var(--border);border-radius:9px;padding:9px;text-align:center;color:var(--dim);
    font-size:12px;cursor:pointer;margin-bottom:8px}
  .upload:hover{border-color:var(--accent-dim);color:var(--ink)}
  .upload.busy{opacity:.55;pointer-events:none}
  #doclist{overflow-y:auto;min-height:0;flex:1}
  .doc{display:flex;gap:9px;align-items:flex-start;padding:7px 6px;border-radius:8px;font-size:12.5px}
  .doc:hover{background:var(--panel)}
  .doc .ic{flex:none;margin-top:1px;color:var(--amber);font-size:13px}
  .doc .b{min-width:0;flex:1}
  .doc .t{color:var(--ink);font-weight:550;overflow-wrap:anywhere}
  .doc .m{color:var(--faint);font-size:11px;font-family:var(--mono)}
  .doc .del{flex:none;color:var(--faint);font-size:13px;padding:1px 5px;border-radius:5px;visibility:hidden}
  .doc:hover .del{visibility:visible}
  .doc .del:hover{color:var(--bad);background:var(--soft)}
  .status{border-top:1px solid var(--border-soft);padding-top:9px;margin-top:8px;
    font:500 10.5px var(--mono);color:var(--faint);line-height:1.8}
  .status b{color:var(--dim);font-weight:600}

  /* ---------- profile / auth ---------- */
  .profile{display:flex;align-items:center;gap:9px;border-top:1px solid var(--border-soft);
    padding-top:10px;margin-top:8px}
  .profile[hidden]{display:none}
  .profile img{width:30px;height:30px;border-radius:50%;border:1px solid var(--border)}
  .profile .pi{flex:1;min-width:0}
  .profile .pn{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .profile .pe{font:500 10px var(--mono);color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .profile .out{flex:none;color:var(--faint);font-size:11px;padding:3px 7px;border:1px solid var(--border-soft);border-radius:6px}
  .profile .out:hover{color:var(--bad);border-color:var(--bad)}
  #gsi-btn{margin-top:10px;display:flex;justify-content:center}

  /* ---------- topbar ---------- */
  main{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0}
  .topbar{flex:none;display:flex;align-items:center;gap:8px;padding:8px 14px;
    border-bottom:1px solid var(--border-soft);background:var(--glass);backdrop-filter:blur(12px)}
  .topbar .title{flex:1;min-width:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dim)}
  .tbtn{display:inline-flex;align-items:center;gap:6px;font:600 11px var(--mono);color:var(--dim);
    border:1px solid var(--border-soft);border-radius:7px;padding:5px 10px}
  .tbtn:hover{color:var(--ink);border-color:var(--border)}
  .tbtn.on{color:var(--accent);border-color:var(--accent-dim);background:var(--soft)}

  /* ---------- chat ---------- */
  #thread{flex:1;overflow-y:auto;padding:24px 0 10px;scroll-behavior:smooth}
  .lane{max-width:860px;margin:0 auto;padding:0 22px}
  .msg{margin-bottom:18px;display:flex;flex-direction:column;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.user{align-items:flex-end}
  .bubble-u{background:var(--soft);border:1px solid var(--border);border-radius:14px 14px 4px 14px;
    padding:10px 15px;max-width:78%;white-space:pre-wrap}
  .bubble-a{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;
    padding:16px 19px;max-width:100%;backdrop-filter:blur(10px)}
  .bubble-a h4{font:650 12px/1.4 var(--mono);letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent);margin:14px 0 6px}
  .bubble-a h4:first-child{margin-top:0}
  .bubble-a p{margin:0 0 9px}
  .bubble-a ul,.bubble-a ol{margin:0 0 9px;padding-left:20px}
  .bubble-a li{margin-bottom:5px}
  .bubble-a table{border-collapse:collapse;margin:4px 0 10px;font-size:12.5px;width:100%}
  .bubble-a th,.bubble-a td{border:1px solid var(--border-soft);padding:5px 9px;text-align:left}
  .bubble-a th{background:var(--soft);color:var(--dim);font:600 10.5px var(--mono);letter-spacing:.05em;text-transform:uppercase}
  .bubble-a code{background:var(--inset);border:1px solid var(--border-soft);border-radius:5px;
    padding:1px 5px;font-size:12px;font-family:var(--mono)}
  .cite-n{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;
    padding:0 3px;border-radius:5px;background:rgba(240,160,60,.13);border:1px solid rgba(240,160,60,.4);
    color:var(--accent);font:600 9.5px var(--mono);vertical-align:2px;margin:0 1px}
  .warn-note{border:1px solid rgba(224,166,62,.45);background:rgba(224,166,62,.07);color:#EFC788;
    border-radius:9px;padding:9px 13px;font-size:12.5px;margin-top:10px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px;padding-top:11px;
    border-top:1px solid var(--border-soft)}
  .conf{display:inline-flex;align-items:center;gap:6px;font:600 10.5px var(--mono);border-radius:7px;
    padding:5px 9px;border:1px solid}
  .conf.hi{color:#8ED9B5;border-color:rgba(70,181,132,.5);background:rgba(70,181,132,.08)}
  .conf.mid{color:#EFC788;border-color:rgba(224,166,62,.5);background:rgba(224,166,62,.08)}
  .conf.lo{color:#F2A0A0;border-color:rgba(226,90,90,.5);background:rgba(226,90,90,.08)}
  .tagchip{font:500 10.5px var(--mono);color:var(--faint);border:1px solid var(--border-soft);
    border-radius:7px;padding:5px 9px}
  .tagchip.adapt{color:var(--accent);border-color:var(--accent-dim);background:rgba(240,160,60,.07)}
  .toggle{font:600 11px var(--mono);letter-spacing:.05em;color:var(--dim);border:1px solid var(--border-soft);
    border-radius:7px;padding:5px 10px}
  .toggle:hover{color:var(--ink);border-color:var(--border)}
  .toggle.on{color:var(--accent);border-color:var(--accent-dim);background:var(--soft)}
  .panel{display:none;margin-top:12px;border:1px solid var(--border-soft);border-radius:10px;
    background:var(--inset);padding:12px}
  .panel.open{display:block}
  .panel .cap{font:600 9.5px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .srcs{margin-top:10px}
  .src{display:flex;gap:8px;font-size:12px;color:var(--dim);padding:3px 0}
  .src .n{flex:none;width:17px;height:17px;border-radius:5px;background:rgba(240,160,60,.13);
    border:1px solid rgba(240,160,60,.4);color:var(--accent);font:600 9.5px/16px var(--mono);text-align:center}
  .trace-step{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
  .trace-step:last-child{border-bottom:none}
  .trace-step .st{flex:none;font:600 10px var(--mono);letter-spacing:.06em;text-transform:uppercase;
    color:var(--accent);min-width:118px;padding-top:1px}
  .trace-step .sm{color:var(--dim)}
  .followups{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .fu{font-size:12px;color:var(--dim);border:1px solid var(--border-soft);border-radius:999px;
    padding:5px 12px;cursor:pointer}
  .fu:hover{color:var(--accent);border-color:var(--accent-dim)}
  .thinking{display:inline-flex;gap:4px;align-items:center;color:var(--dim);font-size:13px}
  .thinking i{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:bl 1s infinite}
  .thinking i:nth-child(2){animation-delay:.2s}.thinking i:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%{opacity:.25}40%{opacity:1}}
  .caret{display:inline-block;width:7px;height:14px;background:var(--accent);vertical-align:-2px;animation:bl .8s infinite}
  .hello{color:var(--dim);text-align:center;padding:60px 20px 30px;max-width:560px;margin:0 auto}
  .hello h2{color:var(--ink);font-size:19px;margin:0 0 8px}
  .hint{display:inline-block;background:var(--panel);border:1px solid var(--border);border-radius:999px;
    padding:7px 14px;font-size:12.5px;color:var(--dim);cursor:pointer;margin:4px}
  .hint:hover{color:var(--ink);border-color:var(--accent-dim)}

  /* ---------- composer ---------- */
  .composer{flex:none;border-top:1px solid var(--border);background:var(--glass);backdrop-filter:blur(12px);padding:13px 0 16px}
  .cbox{display:flex;gap:10px;align-items:flex-end;background:var(--panel);border:1px solid var(--border);
    border-radius:14px;padding:10px 10px 10px 16px}
  .cbox:focus-within{border-color:var(--accent-dim)}
  .cbox textarea{flex:1;background:none;border:0;color:var(--ink);resize:none;outline:none;
    max-height:150px;line-height:1.5;padding:4px 0}
  .send{background:var(--accent);color:#17110A;border-radius:9px;padding:9px 16px;font-weight:650;font-size:13px}
  .send:hover{background:#F7B056} .send:disabled{opacity:.45;cursor:not-allowed}
  .cfoot{font:500 10px var(--mono);color:var(--faint);margin-top:7px;text-align:center;letter-spacing:.04em}

  /* ---------- graph side panel ---------- */
  #graphside{width:var(--graph-w);min-width:260px;max-width:640px;flex:none;background:var(--inset);
    border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  #graphside.collapsed{display:none}
  #graphside.fullscreen{position:fixed;inset:0;z-index:60;width:auto!important;max-width:none;border:0}
  .ghead{flex:none;display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
  .ghead .gt{font:600 10px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);flex:1}
  .gbtn{color:var(--dim);border:1px solid var(--border-soft);border-radius:6px;padding:3px 8px;font:600 11px var(--mono)}
  .gbtn:hover{color:var(--ink);border-color:var(--border)}
  .gbtn.on{color:var(--accent);border-color:var(--accent-dim)}
  .gsearch{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border-soft)}
  .gsearch input{flex:1;background:var(--panel);border:1px solid var(--border-soft);border-radius:7px;
    color:var(--ink);font-size:12px;padding:5px 9px;outline:none;min-width:0}
  .gsearch select{background:var(--panel);border:1px solid var(--border-soft);border-radius:7px;
    color:var(--dim);font:600 10.5px var(--mono);padding:5px 6px;outline:none}
  #gcanvas-wrap{flex:1;position:relative;min-height:0;overflow:hidden;background:
    radial-gradient(ellipse at 50% 30%, rgba(30,42,66,.5), transparent 70%)}
  #gcanvas{width:100%;height:100%;display:block;cursor:grab}
  #gcanvas.dragging{cursor:grabbing}
  #minimap{position:absolute;right:10px;bottom:10px;width:120px;height:84px;background:rgba(8,12,20,.85);
    border:1px solid var(--border-soft);border-radius:7px}
  .glegend2{flex:none;display:flex;flex-wrap:wrap;gap:8px;padding:9px 12px;border-top:1px solid var(--border-soft);
    font:500 10px var(--mono);color:var(--dim)}
  .glegend2 .li{display:inline-flex;align-items:center;gap:5px;cursor:pointer;padding:2px 6px;border-radius:5px}
  .glegend2 .li:hover{background:var(--panel)}
  .glegend2 .li.off{opacity:.35}
  .glegend2 i{display:inline-block;width:8px;height:8px;border-radius:50%}
  /* node drawer */
  #ndrawer{position:absolute;left:0;top:0;bottom:0;width:230px;background:rgba(10,14,23,.94);
    border-right:1px solid var(--border-soft);padding:14px;transform:translateX(-100%);transition:transform .2s;
    overflow-y:auto;backdrop-filter:blur(8px)}
  #ndrawer.open{transform:none}
  #ndrawer h5{margin:0 0 3px;font-size:13.5px}
  #ndrawer .nt{font:600 9.5px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  #ndrawer .nr{font-size:11.5px;color:var(--dim);padding:4px 0;border-bottom:1px solid var(--border-soft)}
  #ndrawer .nr b{color:var(--faint);font:600 9px var(--mono);letter-spacing:.08em;text-transform:uppercase;display:block}
  #ndrawer .close{position:absolute;top:8px;right:8px;color:var(--faint);font-size:14px}

  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(90px);
    background:var(--soft);border:1px solid var(--accent-dim);border-radius:10px;padding:10px 16px;
    font-size:12.5px;transition:transform .3s;z-index:70;max-width:88vw}
  #toast.show{transform:translateX(-50%) translateY(0)}

  @media(max-width:900px){
    aside{position:fixed;inset:0 auto 0 0;z-index:40;box-shadow:8px 0 30px rgba(0,0,0,.5)}
    #graphside{display:none}
    .splitter{display:none}
  }
  /* ============ ASSET360 ============ */
  #asset360{position:absolute;inset:0;z-index:40;background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden}
  #asset360[hidden]{display:none}
  .a3-head{display:flex;align-items:center;gap:10px;padding:10px 14px;
    border-bottom:1px solid var(--border);background:var(--panel)}
  .a3-title{font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    font-size:11px;color:var(--accent)}
  .a3-spacer{flex:1}
  #a3-pick{background:var(--inset);color:var(--ink);border:1px solid var(--border);
    border-radius:6px;padding:5px 9px;font-size:12px;font-family:var(--mono)}
  #a3-body{flex:1;overflow:auto;padding:14px;display:grid;gap:12px;
    grid-template-columns:repeat(auto-fit,minmax(310px,1fr));align-content:start}
  .a3-empty{color:var(--dim);padding:24px;font-size:13px}
  .a3-card{background:var(--panel);border:1px solid var(--border-soft);
    border-radius:10px;padding:12px 13px;min-width:0}
  .a3-card h4{margin:0 0 9px;font-size:10px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--faint);font-weight:700}
  .a3-hero{grid-column:1/-1;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .a3-id{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink)}
  .a3-sub{color:var(--dim);font-size:13px}
  .a3-pill{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 9px;border-radius:99px;border:1px solid}
  .h-healthy{color:var(--good);border-color:var(--good);background:rgba(70,181,132,.10)}
  .h-alert{color:var(--warn);border-color:var(--warn);background:rgba(224,166,62,.10)}
  .h-danger{color:var(--bad);border-color:var(--bad);background:rgba(226,90,90,.10)}
  .h-unknown{color:var(--faint);border-color:var(--border)}
  .a3-kv{display:flex;justify-content:space-between;gap:10px;padding:4px 0;
    border-bottom:1px solid var(--border-soft);font-size:12.5px}
  .a3-kv:last-child{border-bottom:0}
  .a3-kv span:first-child{color:var(--dim)}
  .a3-kv span:last-child{font-family:var(--mono);color:var(--ink);text-align:right}
  .a3-big{font-family:var(--mono);font-size:24px;font-weight:700}
  .a3-chips{display:flex;flex-wrap:wrap;gap:6px}
  .a3-chip{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px;
    background:var(--soft);border:1px solid var(--border-soft);color:var(--dim)}
  .a3-chip b{color:var(--ink);font-weight:600}
  .a3-wo{border-left:2px solid var(--border);padding:6px 0 6px 9px;margin-bottom:8px}
  .a3-wo:last-child{margin-bottom:0}
  .a3-wo.corrective{border-left-color:var(--bad)}
  .a3-wo.preventive{border-left-color:var(--good)}
  .a3-wo .r1{display:flex;gap:8px;align-items:center;font-size:12px}
  .a3-wo .wo{font-family:var(--mono);color:var(--accent);font-weight:600}
  .a3-wo .dt{color:var(--faint);font-size:11px}
  .a3-wo .r2{color:var(--dim);font-size:11.5px;margin-top:3px;line-height:1.45}
  .a3-spark{width:100%;height:64px;display:block}
  .a3-low{color:var(--bad);font-weight:700}
  .a3-note{color:var(--faint);font-size:11px;margin-top:8px;line-height:1.5}
  /* clickable, source-traced work orders */
  .a3-wo.src{cursor:pointer;transition:background .12s}
  .a3-wo.src:hover{background:var(--soft)}
  .a3-wo .srcbadge{font:600 9px var(--mono);letter-spacing:.04em;color:var(--accent);
    border:1px solid var(--accent-dim);border-radius:5px;padding:1px 5px;margin-left:auto}
  .a3-wo .r3{display:flex;gap:8px;align-items:center;margin-top:4px;font:500 10.5px var(--mono);color:var(--faint)}

  /* ============ MAINTENANCE INGESTION MODAL ============ */
  #mx{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center}
  #mx[hidden]{display:none}
  .mx-backdrop{position:absolute;inset:0;background:rgba(6,9,15,.72);backdrop-filter:blur(3px)}
  .mx-dialog{position:relative;z-index:1;width:min(680px,94vw);max-height:90vh;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    box-shadow:0 24px 70px rgba(0,0,0,.55);animation:rise .22s ease}
  .mx-dialog.wide{width:min(1040px,96vw)}
  .mx-head{flex:none;display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border-soft)}
  .mx-title{font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:11px;color:var(--accent)}
  .mx-sub{color:var(--dim);font-size:12px;font-family:var(--mono);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mx-x{margin-left:auto;color:var(--faint);font-size:15px;padding:2px 7px;border-radius:6px}
  .mx-x:hover{color:var(--ink);background:var(--soft)}
  .mx-body{flex:1;overflow:auto;padding:16px}
  .mx-foot{flex:none;display:flex;gap:9px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--border-soft);flex-wrap:wrap}
  .mx-btn{border:1px solid var(--border);border-radius:9px;padding:8px 15px;font-weight:600;font-size:12.5px;color:var(--dim)}
  .mx-btn:hover{color:var(--ink);border-color:var(--accent-dim)}
  .mx-btn.primary{background:var(--accent);color:#17110A;border-color:var(--accent)}
  .mx-btn.primary:hover{background:#F7B056}
  .mx-btn.danger:hover{color:var(--bad);border-color:var(--bad)}
  .mx-btn:disabled{opacity:.45;cursor:not-allowed}
  /* stepper */
  .mx-steps{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
  .mx-step{display:flex;align-items:center;gap:11px;padding:9px 4px}
  .mx-dot{flex:none;width:22px;height:22px;border-radius:50%;border:1.6px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--faint);font-weight:700}
  .mx-step.done .mx-dot{border-color:var(--good);color:var(--good);background:rgba(70,181,132,.1)}
  .mx-step.active .mx-dot{border-color:var(--accent);color:var(--accent);background:rgba(240,160,60,.1)}
  .mx-step .st{font-size:13px;color:var(--ink)}
  .mx-step.pending .st{color:var(--faint)}
  .mx-step .sm{display:block;font-size:11px;color:var(--dim);margin-top:1px}
  .mx-ask{margin-top:12px;border:1px solid var(--accent-dim);background:rgba(240,160,60,.06);
    border-radius:11px;padding:15px 16px}
  .mx-ask h3{margin:0 0 5px;font-size:15px;color:var(--ink)}
  .mx-ask p{margin:0;color:var(--dim);font-size:12.5px}
  .mx-type{display:inline-flex;align-items:center;gap:6px;font:600 10.5px var(--mono);color:var(--accent);
    border:1px solid var(--accent-dim);border-radius:6px;padding:3px 8px}
  /* asset chooser */
  .mx-assets{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .mx-asset{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:9px;
    padding:8px 12px;cursor:pointer;font-size:13px}
  .mx-asset:hover{border-color:var(--accent-dim)}
  .mx-asset input{accent-color:var(--accent);width:15px;height:15px}
  .mx-asset .tag{font-family:var(--mono);color:var(--ink);font-weight:600}
  /* preview cards */
  .mx-ev{border:1px solid var(--border-soft);border-radius:11px;padding:14px;margin-bottom:14px;background:var(--inset)}
  .mx-ev-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .mx-ev-asset{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--ink)}
  .mx-conf{margin-left:auto;font:600 10.5px var(--mono);border-radius:7px;padding:4px 9px;border:1px solid}
  .mx-conf.hi{color:#8ED9B5;border-color:rgba(70,181,132,.5);background:rgba(70,181,132,.08)}
  .mx-conf.mid{color:#EFC788;border-color:rgba(224,166,62,.5);background:rgba(224,166,62,.08)}
  .mx-conf.lo{color:#F2A0A0;border-color:rgba(226,90,90,.5);background:rgba(226,90,90,.08)}
  .mx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
  .mx-f{display:flex;flex-direction:column;gap:4px;min-width:0}
  .mx-f.span{grid-column:1/-1}
  .mx-f label{font:600 9px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .mx-f .val{font-size:13px;color:var(--ink);word-break:break-word;min-height:19px}
  .mx-f input{background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--ink);
    font-size:13px;padding:6px 9px;outline:none;min-width:0}
  .mx-f input:focus{border-color:var(--accent-dim)}
  .mx-findings{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .mx-find{display:flex;gap:8px;align-items:flex-start;font-size:12px;border-radius:8px;padding:8px 11px;border:1px solid}
  .mx-find.error{color:#F2A0A0;border-color:rgba(226,90,90,.5);background:rgba(226,90,90,.07)}
  .mx-find.warning{color:#EFC788;border-color:rgba(224,166,62,.45);background:rgba(224,166,62,.06)}
  .mx-find .ic{flex:none;font-weight:700}
  .mx-ok{color:var(--good);font-size:12px;margin-top:11px;display:flex;align-items:center;gap:6px}
  .mx-load{color:var(--dim);font-size:13px;padding:26px;text-align:center}
  /* source traceability viewer */
  .mx-trace{display:grid;grid-template-columns:1.25fr 1fr;gap:14px}
  @media(max-width:760px){.mx-trace{grid-template-columns:1fr}}
  .mx-trace iframe{width:100%;height:56vh;border:1px solid var(--border);border-radius:9px;background:#fff}
  .mx-trace .noframe{height:56vh;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--dim);border:1px dashed var(--border);border-radius:9px;padding:20px;font-size:12.5px}
  .mx-trace .fields .mx-f{margin-bottom:9px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ============ SIDEBAR ============ -->
  <aside id="sidebar">
    <div class="brand"><b>AX<i>O</i>N</b><span>knowledge OS</span></div>
    <button class="newchat" id="newchat">+ New conversation</button>

    <div class="sec-label">Conversations <span class="n" id="convcount">—</span></div>
    <div class="searchbox">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="convsearch" placeholder="Search conversations…" aria-label="Search conversations">
    </div>
    <div id="convlist"></div>

    <div class="sec-label">Documents <span class="n" id="doccount">—</span></div>
    <div class="upload" id="upzone" role="button" tabindex="0">⇪ Add document (pdf, docx, xlsx, csv, html, images, …)</div>
    <input type="file" id="upfile" accept=".pdf,.md,.txt,.html,.htm,.docx,.csv,.tsv,.xlsx,.json,.png,.jpg,.jpeg,.webp" hidden>
    <div id="doclist"></div>

    <div class="status" id="status">connecting…</div>
    <div class="profile" id="profile" hidden>
      <img id="pimg" alt="Profile photo" referrerpolicy="no-referrer">
      <div class="pi"><div class="pn" id="pname"></div><div class="pe" id="pemail"></div></div>
      <button class="out" id="signout">Sign out</button>
    </div>
    <div id="gsi-btn"></div>
  </aside>

  <div class="splitter" id="split-l" role="separator" aria-label="Resize sidebar"></div>

  <!-- ============ CHAT ============ -->
  <main>
    <div class="topbar">
      <button class="tbtn" id="tgl-side" title="Toggle sidebar (Ctrl+B)">☰</button>
      <div class="title" id="convtitle">New conversation</div>
      <button class="tbtn" id="tgl-focus" title="Chat-only focus mode (Ctrl+.)">⛶ Focus</button>
      <button class="tbtn" id="tgl-asset" title="Asset360 — complete asset profile">⬢ Asset360</button>
      <button class="tbtn" id="tgl-graph" title="Toggle graph panel">◈ Graph</button>
    </div>

    <!-- ============ ASSET360 OVERLAY ============ -->
    <div id="asset360" hidden>
      <div class="a3-head">
        <span class="a3-title">Asset360</span>
        <select id="a3-pick" aria-label="Select asset"></select>
        <span class="a3-spacer"></span>
        <button class="tbtn" id="a3-close" title="Close">✕</button>
      </div>
      <div id="a3-body"><div class="a3-empty">Loading assets…</div></div>
    </div>
    <div id="thread"><div class="lane" id="lane"></div></div>
    <div class="composer"><div class="lane">
      <div class="cbox">
        <textarea id="q" rows="1" placeholder="Ask about your documents — or about this conversation…"></textarea>
        <button class="send" id="send">Ask</button>
      </div>
      <div class="cfoot">EVERY ANSWER IS GROUNDED &amp; CITED · LOW CONFIDENCE → AXON REFUSES · GRAPH SHOWS WHAT WAS USED</div>
    </div></div>
  </main>

  <div class="splitter" id="split-r" role="separator" aria-label="Resize graph panel"></div>

  <!-- ============ GRAPH PANEL ============ -->
  <section id="graphside" aria-label="Knowledge graph">
    <div class="ghead">
      <span class="gt">Knowledge graph</span>
      <button class="gbtn" id="g-zi" title="Zoom in">+</button>
      <button class="gbtn" id="g-zo" title="Zoom out">−</button>
      <button class="gbtn" id="g-fit" title="Fit to screen">Fit</button>
      <button class="gbtn" id="g-reset" title="Reset view">Reset</button>
      <button class="gbtn" id="g-full" title="Fullscreen">⛶</button>
      <button class="gbtn" id="g-png" title="Export PNG">PNG</button>
      <button class="gbtn" id="g-json" title="Export JSON">JSON</button>
    </div>
    <div class="gsearch">
      <input id="gfind" placeholder="Find node…" aria-label="Find node">
      <select id="glayout" aria-label="Layout">
        <option value="force">Force</option>
        <option value="radial">Radial</option>
        <option value="grid">Grid</option>
      </select>
    </div>
    <div id="gcanvas-wrap">
      <canvas id="gcanvas"></canvas>
      <canvas id="minimap"></canvas>
      <div id="ndrawer">
        <button class="close" id="ndclose">✕</button>
        <h5 id="ndlabel"></h5>
        <div class="nt" id="ndtype"></div>
        <div id="ndrels"></div>
      </div>
    </div>
    <div class="glegend2" id="glegend"></div>
  </section>
</div>

<!-- ============ MAINTENANCE INGESTION MODAL ============ -->
<div id="mx" hidden>
  <div class="mx-backdrop" id="mx-backdrop"></div>
  <div class="mx-dialog" id="mx-dialog">
    <div class="mx-head">
      <span class="mx-title" id="mx-title">Asset360 ingestion</span>
      <span class="mx-sub" id="mx-sub"></span>
      <button class="mx-x" id="mx-x" title="Close">✕</button>
    </div>
    <div class="mx-body" id="mx-body"></div>
    <div class="mx-foot" id="mx-foot"></div>
  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
